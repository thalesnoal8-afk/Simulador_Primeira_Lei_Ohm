<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lei de Ohm — V = R × I</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1e2d45;
    --accent-blue: #38bdf8;
    --accent-orange: #fb923c;
    --accent-red: #ef4444;
    --accent-green: #4ade80;
    --accent-yellow: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --conductor-cold: #38bdf8;
    --conductor-warm: #fb923c;
    --conductor-hot: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BACKGROUND GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,189,248,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .badge {
    display: inline-block;
    background: rgba(56,189,248,0.12);
    border: 1px solid rgba(56,189,248,0.3);
    color: var(--accent-blue);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.3rem 0.9rem;
    border-radius: 2px;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    font-weight: 400;
  }

  /* MAIN LAYOUT */
  .main-grid {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 1.5rem;
    align-items: start;
  }

  @media (max-width: 780px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* CONTROL PANEL */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
  }

  .panel-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-title::before {
    content: '';
    display: block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-blue);
    box-shadow: 0 0 8px var(--accent-blue);
  }

  /* SLIDERS */
  .slider-group {
    margin-bottom: 2rem;
  }

  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.75rem;
  }

  .slider-name {
    font-size: 1.1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .slider-name em {
    font-style: normal;
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 400;
  }

  .slider-value {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
  }

  .slider-value .unit {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: 2px;
  }

  .slider-track {
    position: relative;
    height: 20px;
    display: flex;
    align-items: center;
    margin-bottom: 0.4rem;
  }

  .slider-track-bg {
    position: absolute;
    left: 0; right: 0;
    height: 6px;
    background: rgba(255,255,255,0.07);
    border-radius: 3px;
    pointer-events: none;
  }

  .slider-fill {
    position: absolute;
    left: 0;
    height: 6px;
    top: 50%;
    transform: translateY(-50%);
    border-radius: 3px;
    pointer-events: none;
    transition: width 0.05s;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 20px;
    background: transparent;
    cursor: pointer;
    margin: 0;
    padding: 0;
    position: relative;
    z-index: 2;
  }

  input[type=range]::-webkit-slider-runnable-track {
    height: 6px;
    border-radius: 3px;
    background: transparent;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: -7px;
  }

  input[type=range]::-moz-range-track {
    height: 6px;
    border-radius: 3px;
    background: transparent;
  }

  input[type=range]::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--bg);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  input[type=range]:hover::-webkit-slider-thumb,
  input[type=range]:active::-webkit-slider-thumb {
    transform: scale(1.2);
  }

  .slider-i input[type=range]::-webkit-slider-thumb {
    background: var(--accent-orange);
    box-shadow: 0 0 12px rgba(251,146,60,0.6);
  }

  .slider-r input[type=range]::-webkit-slider-thumb {
    background: var(--accent-blue);
    box-shadow: 0 0 12px rgba(56,189,248,0.6);
  }

  .slider-i .slider-fill { background: linear-gradient(90deg, #fb923c88, var(--accent-orange)); }
  .slider-r .slider-fill { background: linear-gradient(90deg, #38bdf888, var(--accent-blue)); }
  .slider-i .slider-value { color: var(--accent-orange); }
  .slider-r .slider-value { color: var(--accent-blue); }

  .range-labels {
    display: flex;
    justify-content: space-between;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
  }

  /* RESULT CARD */
  .result-card {
    background: rgba(56,189,248,0.05);
    border: 1px solid rgba(56,189,248,0.2);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem 1rem;
  }

  .result-metric {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .result-formula {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .result-value {
    font-size: 1.6rem;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    transition: color 0.4s;
    line-height: 1;
  }

  .result-value .unit-v {
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--muted);
  }

  /* TEMPERATURE STATUS */
  .temp-status {
    margin-top: 1.25rem;
    border-radius: 8px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border: 1px solid;
    transition: all 0.4s;
  }

  .temp-icon {
    font-size: 1.6rem;
    flex-shrink: 0;
  }

  .temp-text {
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .temp-sub {
    font-size: 0.72rem;
    font-weight: 400;
    opacity: 0.75;
    margin-top: 1px;
  }

  /* VISUALIZATION PANEL */
  .viz-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* CONDUCTOR WRAPPER */
  .conductor-scene {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 220px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  /* Circuit endpoints */
  .endpoint {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    z-index: 10;
  }

  .endpoint.left { left: 12px; }
  .endpoint.right { right: 12px; }

  .endpoint-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid;
  }

  .endpoint.left .endpoint-dot { background: var(--accent-orange); border-color: var(--accent-orange); box-shadow: 0 0 10px var(--accent-orange); }
  .endpoint.right .endpoint-dot { background: #475569; border-color: #475569; }

  .endpoint-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* CONDUCTOR SVG wrapper */
  .conductor-svg-wrap {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #conductor-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* PARTICLES canvas */
  #particle-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* HEAT OVERLAY */
  #heat-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    border-radius: 10px;
    transition: opacity 0.5s;
    opacity: 0;
  }

  /* LEGEND */
  .legend {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
  }

  .legend-item {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    text-align: center;
  }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin: 0 auto 0.4rem;
  }

  .legend-item-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    line-height: 1.4;
  }

  /* HEAT GAUGE */
  .gauge-row {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .gauge-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.08em;
  }

  .gauge-bar {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    overflow: hidden;
  }

  .gauge-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease, background 0.4s ease;
  }

  .gauge-pct {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    min-width: 36px;
    text-align: right;
    transition: color 0.4s;
  }

  /* ANIMATIONS */
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  @keyframes spark {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    100% { transform: scale(2.5) rotate(180deg); opacity: 0; }
  }

  .spark {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent-red);
    animation: spark 0.5s forwards;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">⚡ Simulador Interativo</div>
    <h1>1ª Lei de <span>Ohm</span></h1>
    <p class="subtitle">Explore como tensão, corrente e resistência se relacionam</p>
  </header>

  <div class="main-grid">
    <!-- CONTROLS -->
    <div>
      <div class="panel">
        <div class="panel-title">Controles</div>

        <div class="slider-group slider-i">
          <div class="slider-label">
            <span class="slider-name">Corrente <em>(I)</em></span>
            <span class="slider-value" id="val-i">5<span class="unit"> A</span></span>
          </div>
          <div class="slider-track">
            <div class="slider-track-bg"></div>
            <div class="slider-fill" id="fill-i" style="width:21%"></div>
            <input type="range" id="slider-i" min="1" max="20" value="5" step="0.5">
          </div>
          <div class="range-labels"><span>1 A</span><span>20 A</span></div>
        </div>

        <div class="slider-group slider-r">
          <div class="slider-label">
            <span class="slider-name">Resistência <em>(R)</em></span>
            <span class="slider-value" id="val-r">10<span class="unit"> Ω</span></span>
          </div>
          <div class="slider-track">
            <div class="slider-track-bg"></div>
            <div class="slider-fill" id="fill-r" style="width:9%"></div>
            <input type="range" id="slider-r" min="1" max="100" value="10" step="1">
          </div>
          <div class="range-labels"><span>1 Ω</span><span>100 Ω</span></div>
        </div>

        <div class="result-card">
          <div class="result-metric">
            <span class="result-formula">V = R × I</span>
            <span class="result-value" id="result-v">50<span class="unit-v"> V</span></span>
          </div>
          <div class="result-metric">
            <span class="result-formula">P = R · I²</span>
            <span class="result-value" id="result-p" style="color:#fb923c">250<span class="unit-v"> W</span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- VISUALIZATION -->
    <div class="viz-panel">
      <div class="panel-title">Representação do Resistor</div>

      <div class="conductor-scene" id="scene">
        <canvas id="particle-canvas"></canvas>
        <div id="heat-overlay"></div>

      <div class="conductor-svg-wrap">
          <svg id="conductor-svg" viewBox="0 0 600 220" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="conductor-grad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
                <stop offset="50%" stop-color="#0ea5e9" stop-opacity="1"/>
                <stop offset="100%" stop-color="#0284c7" stop-opacity="0.9"/>
              </linearGradient>
              <linearGradient id="conductor-heat-grad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#fb923c" stop-opacity="0.9"/>
                <stop offset="50%" stop-color="#ef4444" stop-opacity="1"/>
                <stop offset="100%" stop-color="#dc2626" stop-opacity="0.9"/>
              </linearGradient>
              <filter id="glow-blue">
                <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="glow-red">
                <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <clipPath id="conductor-clip">
                <rect id="clip-rect" x="50" y="0" width="500" height="220"/>
              </clipPath>
            </defs>
            <!-- Conductor body -->
            <rect id="conductor-body" rx="8" ry="8"/>
            <!-- Conductor shine -->
            <rect id="conductor-shine" rx="4" ry="4" fill="rgba(255,255,255,0.08)"/>
            <!-- Conductor outline -->
            <rect id="conductor-outline" rx="8" ry="8" fill="none" stroke-width="1.5"/>
            <!-- Dimension arrow (bitola) -->
            <g id="bitola-arrow" opacity="0.6">
              <line id="arrow-line" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4 3"/>
              <text id="arrow-text" fill="#38bdf8" font-family="Space Mono, monospace" font-size="10" text-anchor="middle"></text>
            </g>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────
let I = 5, R = 10;
let particles = [];
let animFrame;

const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
const scene = document.getElementById('scene');

// ─── CONDUCTOR GEOMETRY ──────────────────────────────────────────
function getConductorParams() {
  // R: 1→100 maps diameter 110→18px
  const minDiam = 18, maxDiam = 110;
  const rNorm = (R - 1) / 99; // 0=low R, 1=high R
  const diam = maxDiam - rNorm * (maxDiam - minDiam);
  const cx = 300, cy = 110;
  const len = 500;
  const x = cx - len/2;
  const y = cy - diam/2;
  return { x, y, len, diam, cx, cy };
}

// ─── HEAT CALCULATION ─────────────────────────────────────────────
function getHeat() {
  // Power P = R * I^2
  const P = R * I * I;
  // Density = I / wire_area (normalized)
  const { diam } = getConductorParams();
  const area = Math.PI * (diam/2) ** 2;
  const density = I / area * 10000;
  return { P, density };
}

function getHeatLevel() {
  // Normalized heat 0-1
  const { P } = getHeat();
  const maxP = 100 * 20 * 20; // max R * max I^2
  return Math.min(P / (maxP * 0.12), 1);
}

// ─── UPDATE SVG CONDUCTOR ────────────────────────────────────────
function updateConductor() {
  const { x, y, len, diam, cx, cy } = getConductorParams();
  const heat = getHeatLevel();

  const body = document.getElementById('conductor-body');
  const shine = document.getElementById('conductor-shine');
  const outline = document.getElementById('conductor-outline');
  const arrowLine = document.getElementById('arrow-line');
  const arrowText = document.getElementById('arrow-text');
  const bitola = document.getElementById('bitola-arrow');

  body.setAttribute('x', x);
  body.setAttribute('y', y);
  body.setAttribute('width', len);
  body.setAttribute('height', diam);
  body.setAttribute('rx', Math.min(diam/2, 12));
  body.setAttribute('ry', Math.min(diam/2, 12));

  // Color based on heat
  const cold = [56, 189, 248];
  const warm = [251, 146, 60];
  const hot = [239, 68, 68];
  let col;
  if (heat < 0.5) {
    col = lerpColor(cold, warm, heat * 2);
  } else {
    col = lerpColor(warm, hot, (heat - 0.5) * 2);
  }
  const alpha = 0.35 + heat * 0.35;
  body.setAttribute('fill', `rgba(${col[0]},${col[1]},${col[2]},${alpha})`);
  body.setAttribute('filter', heat > 0.5 ? 'url(#glow-red)' : 'url(#glow-blue)');

  shine.setAttribute('x', x + 4);
  shine.setAttribute('y', y + 3);
  shine.setAttribute('width', len - 8);
  shine.setAttribute('height', Math.max(3, diam * 0.15));

  const strokeCol = heat < 0.5
    ? `rgba(${lerpColor(cold,warm,heat*2).join(',')},0.8)`
    : `rgba(${lerpColor(warm,hot,(heat-0.5)*2).join(',')},0.8)`;
  outline.setAttribute('x', x); outline.setAttribute('y', y);
  outline.setAttribute('width', len); outline.setAttribute('height', diam);
  outline.setAttribute('rx', Math.min(diam/2, 12));
  outline.setAttribute('ry', Math.min(diam/2, 12));
  outline.setAttribute('stroke', strokeCol);

  // Bitola arrow (right side)
  const ax = x + len + 18;
  arrowLine.setAttribute('x1', ax); arrowLine.setAttribute('y1', y + 2);
  arrowLine.setAttribute('x2', ax); arrowLine.setAttribute('y2', y + diam - 2);
  arrowText.setAttribute('x', ax + 14);
  arrowText.setAttribute('y', cy + 4);
  arrowText.textContent = `⌀${diam.toFixed(0)}`;

  // Heat overlay
  const overlay = document.getElementById('heat-overlay');
  if (heat > 0.3) {
    const o = (heat - 0.3) / 0.7 * 0.35;
    overlay.style.opacity = o;
    overlay.style.background = `radial-gradient(ellipse at center, rgba(239,68,68,${o*1.5}) 0%, transparent 70%)`;
  } else {
    overlay.style.opacity = 0;
  }
}

function lerpColor(a, b, t) {
  return a.map((v, i) => Math.round(v + (b[i] - v) * t));
}

// ─── PARTICLES ───────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width = scene.offsetWidth;
  canvas.height = scene.offsetHeight;
}

function spawnParticles() {
  particles = [];
  const { x, y, len, diam } = getConductorParams();
  const svgW = 600, svgH = 220;
  const sceneW = canvas.width, sceneH = canvas.height;
  const scaleX = sceneW / svgW;
  const scaleY = sceneH / svgH;

  // Number of particles scales with I
  const count = Math.round(8 + (I / 20) * 52);

  for (let i = 0; i < count; i++) {
    const px = (x + Math.random() * len) * scaleX;
    const margin = 6 * scaleY;
    const py = (y * scaleY + margin) + Math.random() * (diam * scaleY - margin * 2);
    particles.push({
      x: px, y: py,
      ox: px, oy: py,
      vx: (0.5 + Math.random() * 1.5) * (I / 10),
      vy: (Math.random() - 0.5) * 0.4,
      r: 3 + Math.random() * 2,
      phase: Math.random() * Math.PI * 2,
      // conductor bounds in canvas coords
      cxMin: x * scaleX, cxMax: (x + len) * scaleX,
      cyMin: y * scaleY + margin, cyMax: (y + diam) * scaleY - margin,
      scaleX, scaleY, condX: x, condLen: len, condY: y, condDiam: diam
    });
  }
}

function drawParticles(ts) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const heat = getHeatLevel();
  const { x, y, len, diam } = getConductorParams();

  particles.forEach(p => {
    p.scaleX = canvas.width / 600;
    p.scaleY = canvas.height / 220;
    const margin = 6 * p.scaleY;
    p.cyMin = y * p.scaleY + margin;
    p.cyMax = (y + diam) * p.scaleY - margin;
    p.cxMin = x * p.scaleX;
    p.cxMax = (x + len) * p.scaleX;

    // Move
    p.x += p.vx;
    p.y += p.vy + Math.sin(ts * 0.001 + p.phase) * 0.3;

    // Bounce vertically within conductor
    if (p.y < p.cyMin) { p.y = p.cyMin; p.vy *= -1; }
    if (p.y > p.cyMax) { p.y = p.cyMax; p.vy *= -1; }

    // Loop horizontally
    if (p.x > p.cxMax) p.x = p.cxMin;
    if (p.x < p.cxMin) p.x = p.cxMax;

    // Color
    let cold = [56, 189, 248], warm = [251,146,60], hot = [239,68,68];
    let col;
    if (heat < 0.5) col = lerpColor(cold, warm, heat * 2);
    else col = lerpColor(warm, hot, (heat - 0.5) * 2);

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${col.join(',')}, 0.85)`;
    ctx.shadowColor = `rgb(${col.join(',')})`;
    ctx.shadowBlur = 8 + heat * 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

// ─── UI UPDATES ──────────────────────────────────────────────────
function updateUI() {
  const V = (R * I).toFixed(1);
  const heat = getHeatLevel();

  // Values
  document.getElementById('val-i').innerHTML = `${I}<span class="unit"> A</span>`;
  document.getElementById('val-r').innerHTML = `${R}<span class="unit"> Ω</span>`;
  document.getElementById('result-v').innerHTML = `${V}<span class="unit-v"> V</span>`;

  // Slider fills
  document.getElementById('fill-i').style.width = `${((I-1)/19)*100}%`;
  document.getElementById('fill-r').style.width = `${((R-1)/99)*100}%`;

  // Voltage color
  const rv = document.getElementById('result-v');
  if (heat > 0.65) rv.style.color = '#ef4444';
  else if (heat > 0.35) rv.style.color = '#fb923c';
  else rv.style.color = '#fff';

  // Power value
  const P = R * I * I;
  const rp = document.getElementById('result-p');
  rp.innerHTML = `${P.toFixed(0)}<span class="unit-v"> W</span>`;
  if (heat > 0.65) rp.style.color = '#ef4444';
  else if (heat > 0.35) rp.style.color = '#fb923c';
  else rp.style.color = '#4ade80';
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────
function loop(ts) {
  drawParticles(ts);
  animFrame = requestAnimationFrame(loop);
}

// ─── EVENTS ──────────────────────────────────────────────────────
document.getElementById('slider-i').addEventListener('input', e => {
  I = parseFloat(e.target.value);
  // Update particle speeds
  particles.forEach(p => p.vx = (0.5 + Math.random() * 1.5) * (I / 10));
  spawnParticles();
  updateConductor();
  updateUI();
});

document.getElementById('slider-r').addEventListener('input', e => {
  R = parseFloat(e.target.value);
  spawnParticles();
  updateConductor();
  updateUI();
});

// ─── INIT ─────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  resizeCanvas();
  spawnParticles();
});

resizeCanvas();
spawnParticles();
updateConductor();
updateUI();
requestAnimationFrame(loop);
</script>
</body>
</html>
